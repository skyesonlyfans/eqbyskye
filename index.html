<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EQ by Skye</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            touch-action: none; /* Prevent pull-to-refresh on mobile */
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            box-sizing: border-box;
        }

        .interactive {
            pointer-events: auto;
        }

        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem top 50%;
            background-size: 0.65rem auto;
        }

        /* Custom Scrollbar for dropdown if needed */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        .title-glow {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <!-- Header -->
        <header class="flex justify-between items-start interactive">
            <div>
                <h1 class="text-3xl font-semibold tracking-tight title-glow">EQ <span class="font-light text-gray-400">by Skye</span></h1>
                <p class="text-xs text-gray-500 mt-1 uppercase tracking-widest" id="status-text">Microphone Standby</p>
            </div>
        </header>

        <!-- Controls / Footer -->
        <div class="w-full max-w-md mx-auto interactive">
            <div class="glass-panel p-4 flex flex-col sm:flex-row gap-4 items-center transition-all duration-300">
                
                <button id="mic-btn" class="flex-shrink-0 w-14 h-14 rounded-full bg-indigo-600 hover:bg-indigo-500 flex items-center justify-center transition-colors shadow-lg shadow-indigo-500/30 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2 focus:ring-offset-gray-900">
                    <!-- Mic Icon -->
                    <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                    </svg>
                    <!-- Stop Icon (Hidden by default) -->
                    <svg id="stop-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />
                    </svg>
                </button>

                <div class="flex-grow w-full relative">
                    <label for="style-select" class="sr-only">Visualizer Style</label>
                    <select id="style-select" class="w-full bg-white/5 border border-white/10 text-white text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-3 px-4 transition-colors outline-none cursor-pointer">
                        <option value="original" class="bg-gray-900 text-white">Original (Classic Bars)</option>
                        <option value="waveform" class="bg-gray-900 text-white">Waveform (Oscilloscope)</option>
                        <option value="radial" class="bg-gray-900 text-white">Radial (Circular)</option>
                        <option value="symmetry" class="bg-gray-900 text-white">Symmetry (Mirrored)</option>
                        <option value="nebula" class="bg-gray-900 text-white">Nebula (Particles)</option>
                    </select>
                </div>
            </div>

            <!-- Error Message Container -->
            <div id="error-container" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-200 text-sm text-center">
                Microphone access denied. Please allow microphone permissions to use the visualizer.
            </div>
        </div>
    </div>

    <script>
        // --- State & Variables ---
        let audioCtx = null;
        let analyser = null;
        let microphoneStream = null;
        let sourceNode = null;
        
        let frequencyData = null;
        let timeDomainData = null;
        
        let isRecording = false;
        let animationId = null;
        let currentStyle = 'original';

        // --- DOM Elements ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimize for no transparency on base
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');
        const stopIcon = document.getElementById('stop-icon');
        const styleSelect = document.getElementById('style-select');
        const statusText = document.getElementById('status-text');
        const errorContainer = document.getElementById('error-container');

        // --- Particles Array (for Nebula style) ---
        let particles = [];
        const numParticles = 150;
        
        // --- Sparks Array (for bass hits in Nebula) ---
        let sparks = [];

        // --- Initialization ---
        function initCanvas() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            initParticles();
            drawIdle(); // Start with an idle animation
        }

        function resizeCanvas() {
            // Handle high DPI displays for sharp rendering
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
        }

        function initParticles() {
            particles = [];
            sparks = []; // reset sparks on init
            for (let i = 0; i < numParticles; i++) {
                particles.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    size: Math.random() * 3 + 1,
                    speedX: (Math.random() - 0.5) * 1,
                    speedY: (Math.random() - 0.5) * 1,
                    baseColor: `hsl(${Math.random() * 60 + 200}, 80%, 60%)` // Blues and Purples
                });
            }
        }

        // --- Audio Setup ---
        async function toggleMicrophone() {
            if (isRecording) {
                stopMicrophone();
            } else {
                await startMicrophone();
            }
        }

        async function startMicrophone() {
            errorContainer.classList.add('hidden');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                microphoneStream = stream;

                // Initialize Audio Context (requires user gesture, which we have here via button click)
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }

                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048; // Higher FFT size for better frequency resolution
                analyser.smoothingTimeConstant = 0.85;

                sourceNode = audioCtx.createMediaStreamSource(stream);
                sourceNode.connect(analyser);
                // Deliberately NOT connecting to audioCtx.destination to avoid feedback

                frequencyData = new Uint8Array(analyser.frequencyBinCount);
                timeDomainData = new Uint8Array(analyser.fftSize);

                isRecording = true;
                updateUIState();
                
                // Stop idle animation and start visualizer loop
                if(animationId) cancelAnimationFrame(animationId);
                drawLoop();

            } catch (err) {
                console.error('Error accessing microphone:', err);
                errorContainer.classList.remove('hidden');
                errorContainer.textContent = "Microphone access denied or unavailable. Please check permissions.";
            }
        }

        function stopMicrophone() {
            if (microphoneStream) {
                microphoneStream.getTracks().forEach(track => track.stop());
            }
            if (sourceNode) {
                sourceNode.disconnect();
            }
            isRecording = false;
            updateUIState();
            
            // Revert to idle animation
            if(animationId) cancelAnimationFrame(animationId);
            drawIdle();
        }

        function updateUIState() {
            if (isRecording) {
                micIcon.classList.add('hidden');
                stopIcon.classList.remove('hidden');
                micBtn.classList.remove('bg-indigo-600', 'hover:bg-indigo-500');
                micBtn.classList.add('bg-red-600', 'hover:bg-red-500', 'shadow-red-500/30');
                statusText.textContent = 'Listening...';
                statusText.classList.add('text-indigo-400', 'animate-pulse');
            } else {
                stopIcon.classList.add('hidden');
                micIcon.classList.remove('hidden');
                micBtn.classList.add('bg-indigo-600', 'hover:bg-indigo-500');
                micBtn.classList.remove('bg-red-600', 'hover:bg-red-500', 'shadow-red-500/30');
                statusText.textContent = 'Microphone Standby';
                statusText.classList.remove('text-indigo-400', 'animate-pulse');
            }
        }

        // --- Rendering Logic ---
        
        // Helper to draw background
        function clearCanvas(alpha = 1) {
            ctx.fillStyle = `rgba(10, 10, 10, ${alpha})`;
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        }

        // Idle animation when mic is off
        let idlePhase = 0;
        function drawIdle() {
            clearCanvas(0.2); // slight trail
            
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            ctx.beginPath();
            ctx.moveTo(0, h / 2);
            for (let i = 0; i < w; i += 10) {
                const y = (h / 2) + Math.sin(i * 0.01 + idlePhase) * 20;
                ctx.lineTo(i, y);
            }
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            idlePhase += 0.02;
            animationId = requestAnimationFrame(drawIdle);
        }

        // Main Animation Loop
        function drawLoop() {
            animationId = requestAnimationFrame(drawLoop);

            // Get audio data
            analyser.getByteFrequencyData(frequencyData);
            analyser.getByteTimeDomainData(timeDomainData);

            const w = window.innerWidth;
            const h = window.innerHeight;

            // Route to selected style
            switch (currentStyle) {
                case 'original':
                    drawStyleOriginal(w, h);
                    break;
                case 'waveform':
                    drawStyleWaveform(w, h);
                    break;
                case 'radial':
                    drawStyleRadial(w, h);
                    break;
                case 'symmetry':
                    drawStyleSymmetry(w, h);
                    break;
                case 'nebula':
                    drawStyleNebula(w, h);
                    break;
            }
        }

        // --- Visualizer Styles ---

        // 1. Original (Classic Bars)
        function drawStyleOriginal(w, h) {
            clearCanvas(1);
            
            const bufferLength = analyser.frequencyBinCount;
            // Use only the lower half of frequencies (where most music lives)
            const activeBins = Math.floor(bufferLength * 0.5); 
            
            // Calculate bar properties dynamically based on screen width
            const barSpacing = 2;
            const maxBarWidth = 12;
            const idealBars = Math.floor(w / (maxBarWidth + barSpacing));
            const numBars = Math.min(idealBars, activeBins);
            const barWidth = (w / numBars) - barSpacing;
            
            // Group frequencies to fit the number of bars
            const step = Math.floor(activeBins / numBars);

            let x = 0;

            for (let i = 0; i < numBars; i++) {
                let sum = 0;
                for(let j = 0; j < step; j++) {
                    sum += frequencyData[(i * step) + j];
                }
                const average = sum / step;
                
                // Map frequency value to height (0-255 -> 0-h)
                const barHeight = (average / 255) * (h * 0.7);

                // Create Gradient
                const gradient = ctx.createLinearGradient(0, h, 0, h - barHeight);
                gradient.addColorStop(0, '#4338ca'); // indigo-700
                gradient.addColorStop(0.5, '#8b5cf6'); // violet-500
                gradient.addColorStop(1, '#38bdf8'); // sky-400

                ctx.fillStyle = gradient;
                
                // Draw rounded top rectangle
                ctx.beginPath();
                ctx.roundRect(x, h - barHeight, barWidth, barHeight, [4, 4, 0, 0]);
                ctx.fill();

                x += barWidth + barSpacing;
            }
        }

        // 2. Waveform (Oscilloscope)
        function drawStyleWaveform(w, h) {
            // Apply slight motion blur
            clearCanvas(0.2); 
            
            const bufferLength = analyser.fftSize;
            
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#818cf8'; // indigo-400
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#4f46e5';
            ctx.beginPath();

            const sliceWidth = w * 1.0 / bufferLength;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const v = timeDomainData[i] / 128.0; // 0 to 2
                const y = v * h / 2;

                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }

                x += sliceWidth;
            }

            ctx.lineTo(w, h / 2);
            ctx.stroke();
            
            // Reset shadow
            ctx.shadowBlur = 0;
        }

        // 3. Radial (Circular)
        function drawStyleRadial(w, h) {
            clearCanvas(0.5);

            const bufferLength = analyser.frequencyBinCount;
            const activeBins = Math.floor(bufferLength * 0.4); 
            const numBars = 120;
            const step = Math.floor(activeBins / numBars);
            
            const centerX = w / 2;
            const centerY = h / 2;
            const radius = Math.min(w, h) * 0.15; // Base radius

            for (let i = 0; i < numBars; i++) {
                let sum = 0;
                for(let j = 0; j < step; j++) {
                    sum += frequencyData[(i * step) + j];
                }
                const average = sum / step;
                
                const barHeight = (average / 255) * (Math.min(w, h) * 0.3);
                
                const rads = (i * (Math.PI * 2)) / numBars;
                
                const x1 = centerX + Math.cos(rads) * radius;
                const y1 = centerY + Math.sin(rads) * radius;
                
                const x2 = centerX + Math.cos(rads) * (radius + barHeight);
                const y2 = centerY + Math.sin(rads) * (radius + barHeight);

                // Hue based on position around circle
                ctx.strokeStyle = `hsl(${(i / numBars) * 360}, 80%, 60%)`;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            
            // Draw central pulse
            const bassSum = frequencyData.slice(0, 10).reduce((a, b) => a + b, 0) / 10;
            const pulseRadius = radius + (bassSum / 255) * 20;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, pulseRadius - 5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(10, 10, 10, 1)`;
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, pulseRadius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 255, 255, ${bassSum / 255})`;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // 4. Symmetry (Mirrored)
        function drawStyleSymmetry(w, h) {
            clearCanvas(1);
            
            const bufferLength = analyser.frequencyBinCount;
            const activeBins = Math.floor(bufferLength * 0.5); 
            
            const numBars = 64;
            const step = Math.floor(activeBins / numBars);
            const barWidth = w / (numBars * 2);
            
            const centerY = h / 2;

            for (let i = 0; i < numBars; i++) {
                let sum = 0;
                for(let j = 0; j < step; j++) {
                    sum += frequencyData[(i * step) + j];
                }
                const average = sum / step;
                const barHeight = (average / 255) * (h * 0.4);

                ctx.fillStyle = `hsl(${220 + (average / 255) * 100}, 90%, 60%)`;

                // Draw Right side
                const rightX = (w / 2) + (i * barWidth);
                ctx.fillRect(rightX, centerY - barHeight, barWidth - 1, barHeight * 2);

                // Draw Left side (Mirrored)
                const leftX = (w / 2) - ((i + 1) * barWidth);
                ctx.fillRect(leftX, centerY - barHeight, barWidth - 1, barHeight * 2);
            }
        }

        // 5. Nebula (Particles with Sparks)
        function drawStyleNebula(w, h) {
            clearCanvas(0.15); // High motion blur

            // Calculate overall volume (average of all frequencies)
            let totalVolume = 0;
            for (let i = 0; i < analyser.frequencyBinCount; i++) {
                totalVolume += frequencyData[i];
            }
            const avgVolume = totalVolume / analyser.frequencyBinCount;
            const volumeNormalized = avgVolume / 255; // 0 to 1

            // Bass volume (lower frequencies)
            let bassVolume = 0;
            for (let i = 0; i < 10; i++) {
                bassVolume += frequencyData[i];
            }
            const avgBass = bassVolume / 10;
            const bassNormalized = avgBass / 255;

            // Generate sparks on heavy bass hits
            if (bassNormalized > 0.7) {
                // Determine how many sparks based on bass intensity
                let sparkCount = Math.floor(Math.random() * 3) + 1; 
                for (let i = 0; i < sparkCount; i++) {
                    // Pick a random existing particle to serve as the emission point
                    let p = particles[Math.floor(Math.random() * particles.length)];
                    sparks.push({
                        x: p.x,
                        y: p.y,
                        vx: (Math.random() - 0.5) * 20, // Explosive velocity
                        vy: (Math.random() - 0.5) * 20,
                        life: 1.0,
                        decay: 0.02 + Math.random() * 0.06, // Fast decay
                        size: Math.random() * 2 + 0.5,
                        color: `hsl(${Math.random() * 50 + 10}, 100%, 75%)` // Fire colors: reds, oranges, yellows
                    });
                }
            }

            // Draw primary nebula particles
            particles.forEach((p, i) => {
                // Link particle size to its specific frequency bin
                const freqBin = Math.floor((i / numParticles) * (analyser.frequencyBinCount * 0.5));
                const freqVal = frequencyData[freqBin] / 255;
                
                // Move particles (speed increases with volume)
                p.x += p.speedX * (1 + volumeNormalized * 5);
                p.y += p.speedY * (1 + volumeNormalized * 5);

                // Wrap around edges
                if (p.x < 0) p.x = w;
                if (p.x > w) p.x = 0;
                if (p.y < 0) p.y = h;
                if (p.y > h) p.y = 0;

                const currentSize = p.size + (freqVal * 15) + (bassNormalized * 5);

                ctx.beginPath();
                ctx.arc(p.x, p.y, currentSize, 0, Math.PI * 2);
                
                // Make colors pop more on loud sounds
                const lightness = 50 + (freqVal * 30);
                ctx.fillStyle = p.baseColor.replace('60%)', `${lightness}%)`);
                
                ctx.shadowBlur = freqVal * 20;
                ctx.shadowColor = ctx.fillStyle;
                
                ctx.fill();
            });

            // Update and draw sparks over the nebula
            for (let i = sparks.length - 1; i >= 0; i--) {
                let s = sparks[i];
                s.x += s.vx;
                s.y += s.vy;
                s.life -= s.decay;

                // Remove dead sparks
                if (s.life <= 0) {
                    sparks.splice(i, 1);
                    continue;
                }

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
                ctx.fillStyle = s.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = s.color;
                ctx.globalAlpha = s.life; // Fade out as it dies
                ctx.fill();
            }
            
            // Reset global properties so they don't affect other things
            ctx.globalAlpha = 1.0; 
            ctx.shadowBlur = 0; 
        }

        // --- Event Listeners ---
        micBtn.addEventListener('click', toggleMicrophone);
        
        styleSelect.addEventListener('change', (e) => {
            currentStyle = e.target.value;
            // Force a clean clear to prevent artifacts when switching styles
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });

        // Initialize setup on load
        window.addEventListener('load', initCanvas);

    </script>
</body>
</html>
