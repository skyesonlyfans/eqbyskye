<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EQ by Skye</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            touch-action: none; /* Prevent pull-to-refresh on mobile */
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            box-sizing: border-box;
        }

        .interactive {
            pointer-events: auto;
        }

        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 50;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            transform: translateY(20px) scale(0.95);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem top 50%;
            background-size: 0.65rem auto;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        .title-glow { text-shadow: 0 0 20px rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <!-- Scripts Modal -->
    <div id="scripts-modal" class="modal-overlay fixed inset-0 flex items-center justify-center p-4">
        <div class="modal-content glass-panel p-6 w-full max-w-md interactive flex flex-col gap-4">
            <div class="flex justify-between items-center mb-2">
                <h2 class="text-xl font-semibold">Plugin Scripts</h2>
                <button id="close-modal-btn" class="text-gray-400 hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            
            <p class="text-sm text-gray-400">Load interactive scripts that react to touch and the microphone. Try interacting with the canvas once loaded!</p>

            <div class="flex flex-col gap-2 mt-2">
                <button onclick="loadBuiltInScript(1)" class="w-full text-left px-4 py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg transition-colors flex justify-between items-center">
                    <span>1. Neon Ripples</span>
                    <span class="text-xs bg-indigo-500/20 text-indigo-300 px-2 py-1 rounded">Interactive</span>
                </button>
                <button onclick="loadBuiltInScript(2)" class="w-full text-left px-4 py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg transition-colors flex justify-between items-center">
                    <span>2. Freq Swarm</span>
                    <span class="text-xs bg-indigo-500/20 text-indigo-300 px-2 py-1 rounded">Interactive</span>
                </button>
                <button onclick="loadBuiltInScript(3)" class="w-full text-left px-4 py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg transition-colors flex justify-between items-center">
                    <span>3. Audio Strings</span>
                    <span class="text-xs bg-indigo-500/20 text-indigo-300 px-2 py-1 rounded">Interactive</span>
                </button>
            </div>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-white/10"></div>
                <span class="flex-shrink-0 mx-4 text-white/30 text-xs uppercase tracking-widest">or</span>
                <div class="flex-grow border-t border-white/10"></div>
            </div>

            <label class="w-full cursor-pointer bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3 px-4 rounded-lg transition-colors text-center shadow-lg shadow-indigo-500/20">
                Upload Custom Script (.js)
                <input type="file" id="custom-script-upload" accept=".js" class="hidden">
            </label>
        </div>
    </div>

    <div id="ui-layer">
        <!-- Header -->
        <header class="flex justify-between items-start interactive">
            <div>
                <h1 class="text-3xl font-semibold tracking-tight title-glow">EQ <span class="font-light text-gray-400">by Skye</span></h1>
                <p class="text-xs text-gray-500 mt-1 uppercase tracking-widest" id="status-text">Microphone Standby</p>
            </div>
        </header>

        <!-- Controls / Footer -->
        <div class="w-full max-w-lg mx-auto interactive">
            <div class="glass-panel p-4 flex flex-col sm:flex-row gap-3 items-center transition-all duration-300">
                
                <button id="mic-btn" class="flex-shrink-0 w-14 h-14 rounded-full bg-indigo-600 hover:bg-indigo-500 flex items-center justify-center transition-colors shadow-lg shadow-indigo-500/30 focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                    </svg>
                    <svg id="stop-icon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1h-4a1 1 0 01-1-1v-4z" />
                    </svg>
                </button>

                <div class="flex-grow w-full relative">
                    <label for="style-select" class="sr-only">Visualizer Style</label>
                    <select id="style-select" class="w-full bg-white/5 border border-white/10 text-white text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-3 px-4 outline-none cursor-pointer">
                        <option value="original" class="bg-gray-900 text-white">Original (Classic Bars)</option>
                        <option value="waveform" class="bg-gray-900 text-white">Waveform (Oscilloscope)</option>
                        <option value="radial" class="bg-gray-900 text-white">Radial (Circular)</option>
                        <option value="symmetry" class="bg-gray-900 text-white">Symmetry (Mirrored)</option>
                        <option value="nebula" class="bg-gray-900 text-white">Nebula (Particles)</option>
                    </select>
                </div>

                <!-- Scripts Button -->
                <button id="open-scripts-btn" class="flex-shrink-0 w-12 h-12 rounded-lg bg-white/5 hover:bg-white/10 border border-white/10 flex items-center justify-center transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-400" title="Load Custom Scripts">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
                    </svg>
                </button>
            </div>

            <div id="error-container" class="hidden mt-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-200 text-sm text-center">
                Microphone access denied. Please allow microphone permissions to use the visualizer.
            </div>
        </div>
    </div>

    <script>
        // --- State & Variables ---
        let audioCtx = null;
        let analyser = null;
        let microphoneStream = null;
        let sourceNode = null;
        
        let frequencyData = null;
        let timeDomainData = null;
        
        let isRecording = false;
        let animationId = null;
        let currentStyle = 'original';

        // --- Interaction Tracking (Touch & Mouse) ---
        let pointerX = window.innerWidth / 2;
        let pointerY = window.innerHeight / 2;
        let isPointerDown = false;

        window.addEventListener('pointermove', (e) => {
            pointerX = e.clientX;
            pointerY = e.clientY;
        });
        window.addEventListener('pointerdown', (e) => {
            isPointerDown = true;
            pointerX = e.clientX;
            pointerY = e.clientY;
        });
        window.addEventListener('pointerup', () => {
            isPointerDown = false;
        });

        // --- Plugin API System ---
        window.CustomVisualizers = {};
        window.registerVisualizer = function(id, name, drawFn, initFn) {
            window.CustomVisualizers[id] = { name, draw: drawFn, init: initFn };
            
            // Add option to dropdown if it doesn't exist
            const select = document.getElementById('style-select');
            if (!select.querySelector(`option[value="${id}"]`)) {
                const option = document.createElement('option');
                option.value = id;
                option.className = 'bg-gray-900 text-indigo-300';
                option.textContent = `⚡ ${name}`;
                select.appendChild(option);
            }
            
            // Switch to it immediately
            select.value = id;
            currentStyle = id;
            if(initFn) initFn();
            
            // Force clear screen
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        };

        // --- DOM Elements ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const micBtn = document.getElementById('mic-btn');
        const micIcon = document.getElementById('mic-icon');
        const stopIcon = document.getElementById('stop-icon');
        const styleSelect = document.getElementById('style-select');
        const statusText = document.getElementById('status-text');
        const errorContainer = document.getElementById('error-container');
        
        const scriptsModal = document.getElementById('scripts-modal');
        const openScriptsBtn = document.getElementById('open-scripts-btn');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const scriptUpload = document.getElementById('custom-script-upload');

        // --- Standard Visualizer Variables ---
        let particles = [];
        const numParticles = 150;
        let sparks = [];

        // --- Initialization ---
        function initCanvas() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            initParticles();
            drawIdle();
        }

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
        }

        function initParticles() {
            particles = [];
            sparks = [];
            for (let i = 0; i < numParticles; i++) {
                particles.push({
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    size: Math.random() * 3 + 1,
                    speedX: (Math.random() - 0.5) * 1,
                    speedY: (Math.random() - 0.5) * 1,
                    baseColor: `hsl(${Math.random() * 60 + 200}, 80%, 60%)`
                });
            }
        }

        // --- Audio Setup ---
        async function toggleMicrophone() {
            if (isRecording) {
                stopMicrophone();
            } else {
                await startMicrophone();
            }
        }

        async function startMicrophone() {
            errorContainer.classList.add('hidden');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                microphoneStream = stream;

                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();

                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 2048;
                analyser.smoothingTimeConstant = 0.85;

                sourceNode = audioCtx.createMediaStreamSource(stream);
                sourceNode.connect(analyser);

                frequencyData = new Uint8Array(analyser.frequencyBinCount);
                timeDomainData = new Uint8Array(analyser.fftSize);

                isRecording = true;
                updateUIState();
                
                if(animationId) cancelAnimationFrame(animationId);
                drawLoop();
            } catch (err) {
                console.error('Error accessing microphone:', err);
                errorContainer.classList.remove('hidden');
                errorContainer.textContent = "Microphone access denied. Please check permissions.";
            }
        }

        function stopMicrophone() {
            if (microphoneStream) microphoneStream.getTracks().forEach(track => track.stop());
            if (sourceNode) sourceNode.disconnect();
            
            isRecording = false;
            updateUIState();
            if(animationId) cancelAnimationFrame(animationId);
            drawIdle();
        }

        function updateUIState() {
            if (isRecording) {
                micIcon.classList.add('hidden');
                stopIcon.classList.remove('hidden');
                micBtn.classList.remove('bg-indigo-600', 'hover:bg-indigo-500');
                micBtn.classList.add('bg-red-600', 'hover:bg-red-500', 'shadow-red-500/30');
                statusText.textContent = 'Listening...';
                statusText.classList.add('text-indigo-400', 'animate-pulse');
            } else {
                stopIcon.classList.add('hidden');
                micIcon.classList.remove('hidden');
                micBtn.classList.add('bg-indigo-600', 'hover:bg-indigo-500');
                micBtn.classList.remove('bg-red-600', 'hover:bg-red-500', 'shadow-red-500/30');
                statusText.textContent = 'Microphone Standby';
                statusText.classList.remove('text-indigo-400', 'animate-pulse');
            }
        }

        // --- Rendering Logic ---
        function clearCanvas(alpha = 1) {
            ctx.fillStyle = `rgba(10, 10, 10, ${alpha})`;
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
        }

        let idlePhase = 0;
        function drawIdle() {
            clearCanvas(0.2); 
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            ctx.beginPath();
            ctx.moveTo(0, h / 2);
            for (let i = 0; i < w; i += 10) {
                const y = (h / 2) + Math.sin(i * 0.01 + idlePhase) * 20;
                ctx.lineTo(i, y);
            }
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            idlePhase += 0.02;
            animationId = requestAnimationFrame(drawIdle);
        }

        function drawLoop() {
            animationId = requestAnimationFrame(drawLoop);

            analyser.getByteFrequencyData(frequencyData);
            analyser.getByteTimeDomainData(timeDomainData);

            const w = window.innerWidth;
            const h = window.innerHeight;

            // Check if current style is a Custom Plugin
            if (window.CustomVisualizers[currentStyle]) {
                const plugin = window.CustomVisualizers[currentStyle];
                ctx.save(); // Protect global canvas state
                try {
                    plugin.draw(ctx, w, h, frequencyData, timeDomainData, pointerX, pointerY, isPointerDown);
                } catch(e) {
                    console.error("Plugin Error:", e);
                }
                ctx.restore();
                return;
            }

            // Standard Styles
            switch (currentStyle) {
                case 'original': drawStyleOriginal(w, h); break;
                case 'waveform': drawStyleWaveform(w, h); break;
                case 'radial': drawStyleRadial(w, h); break;
                case 'symmetry': drawStyleSymmetry(w, h); break;
                case 'nebula': drawStyleNebula(w, h); break;
            }
        }

        // --- Standard Visualizer Styles ---

        function drawStyleOriginal(w, h) {
            clearCanvas(1);
            const activeBins = Math.floor(analyser.frequencyBinCount * 0.5); 
            const barSpacing = 2;
            const maxBarWidth = 12;
            const numBars = Math.min(Math.floor(w / (maxBarWidth + barSpacing)), activeBins);
            const barWidth = (w / numBars) - barSpacing;
            const step = Math.floor(activeBins / numBars);

            let x = 0;
            for (let i = 0; i < numBars; i++) {
                let sum = 0;
                for(let j = 0; j < step; j++) sum += frequencyData[(i * step) + j];
                const average = sum / step;
                const barHeight = (average / 255) * (h * 0.7);

                const gradient = ctx.createLinearGradient(0, h, 0, h - barHeight);
                gradient.addColorStop(0, '#4338ca');
                gradient.addColorStop(0.5, '#8b5cf6');
                gradient.addColorStop(1, '#38bdf8');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(x, h - barHeight, barWidth, barHeight, [4, 4, 0, 0]);
                ctx.fill();
                x += barWidth + barSpacing;
            }
        }

        function drawStyleWaveform(w, h) {
            clearCanvas(0.2); 
            const bufferLength = analyser.fftSize;
            
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#818cf8';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#4f46e5';
            ctx.beginPath();

            const sliceWidth = w * 1.0 / bufferLength;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                const y = (timeDomainData[i] / 128.0) * h / 2;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.lineTo(w, h / 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        function drawStyleRadial(w, h) {
            clearCanvas(0.5);
            const numBars = 120;
            const step = Math.floor(Math.floor(analyser.frequencyBinCount * 0.4) / numBars);
            const centerX = w / 2;
            const centerY = h / 2;
            const radius = Math.min(w, h) * 0.15;

            for (let i = 0; i < numBars; i++) {
                let sum = 0;
                for(let j = 0; j < step; j++) sum += frequencyData[(i * step) + j];
                const barHeight = ((sum / step) / 255) * (Math.min(w, h) * 0.3);
                const rads = (i * (Math.PI * 2)) / numBars;
                
                ctx.strokeStyle = `hsl(${(i / numBars) * 360}, 80%, 60%)`;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(centerX + Math.cos(rads) * radius, centerY + Math.sin(rads) * radius);
                ctx.lineTo(centerX + Math.cos(rads) * (radius + barHeight), centerY + Math.sin(rads) * (radius + barHeight));
                ctx.stroke();
            }
            
            const bassSum = frequencyData.slice(0, 10).reduce((a, b) => a + b, 0) / 10;
            const pulseRadius = radius + (bassSum / 255) * 20;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, pulseRadius - 5, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(10, 10, 10, 1)`;
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, pulseRadius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255, 255, 255, ${bassSum / 255})`;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function drawStyleSymmetry(w, h) {
            clearCanvas(1);
            const numBars = 64;
            const step = Math.floor(Math.floor(analyser.frequencyBinCount * 0.5) / numBars);
            const barWidth = w / (numBars * 2);
            const centerY = h / 2;

            for (let i = 0; i < numBars; i++) {
                let sum = 0;
                for(let j = 0; j < step; j++) sum += frequencyData[(i * step) + j];
                const average = sum / step;
                const barHeight = (average / 255) * (h * 0.4);

                ctx.fillStyle = `hsl(${220 + (average / 255) * 100}, 90%, 60%)`;
                ctx.fillRect((w / 2) + (i * barWidth), centerY - barHeight, barWidth - 1, barHeight * 2);
                ctx.fillRect((w / 2) - ((i + 1) * barWidth), centerY - barHeight, barWidth - 1, barHeight * 2);
            }
        }

        function drawStyleNebula(w, h) {
            clearCanvas(0.15); 
            
            let totalVolume = 0;
            for (let i = 0; i < analyser.frequencyBinCount; i++) totalVolume += frequencyData[i];
            const volumeNormalized = (totalVolume / analyser.frequencyBinCount) / 255; 

            let bassVolume = 0;
            for (let i = 0; i < 10; i++) bassVolume += frequencyData[i];
            const bassNormalized = (bassVolume / 10) / 255;

            if (bassNormalized > 0.7) {
                let sparkCount = Math.floor(Math.random() * 3) + 1; 
                for (let i = 0; i < sparkCount; i++) {
                    let p = particles[Math.floor(Math.random() * particles.length)];
                    sparks.push({
                        x: p.x, y: p.y,
                        vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20,
                        life: 1.0, decay: 0.02 + Math.random() * 0.06, size: Math.random() * 2 + 0.5,
                        color: `hsl(${Math.random() * 50 + 10}, 100%, 75%)`
                    });
                }
            }

            particles.forEach((p, i) => {
                const freqBin = Math.floor((i / numParticles) * (analyser.frequencyBinCount * 0.5));
                const freqVal = frequencyData[freqBin] / 255;
                
                p.x += p.speedX * (1 + volumeNormalized * 5);
                p.y += p.speedY * (1 + volumeNormalized * 5);
                if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
                if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size + (freqVal * 15) + (bassNormalized * 5), 0, Math.PI * 2);
                ctx.fillStyle = p.baseColor.replace('60%)', `${50 + (freqVal * 30)}%)`);
                ctx.shadowBlur = freqVal * 20;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fill();
            });

            for (let i = sparks.length - 1; i >= 0; i--) {
                let s = sparks[i];
                s.x += s.vx; s.y += s.vy; s.life -= s.decay;
                if (s.life <= 0) { sparks.splice(i, 1); continue; }

                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
                ctx.fillStyle = s.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = s.color;
                ctx.globalAlpha = s.life;
                ctx.fill();
            }
            ctx.globalAlpha = 1.0; 
            ctx.shadowBlur = 0; 
        }

        // --- Custom Script Loading Mechanics ---

        function injectScript(codeString) {
            const blob = new Blob([codeString], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            const script = document.createElement('script');
            script.src = url;
            document.head.appendChild(script);
        }

        // 3 Built-in Preview Scripts (Stored as strings so they function identically to uploaded files)
        const PREVIEW_SCRIPTS = {
            1: `
                let ripples = [];
                window.registerVisualizer('plugin-ripples', 'Neon Ripples', (ctx, w, h, freq, time, px, py, isDown) => {
                    ctx.fillStyle = 'rgba(10,10,10,0.2)';
                    ctx.fillRect(0, 0, w, h);
                    
                    let bass = 0;
                    for(let i=0; i<10; i++) bass += freq[i];
                    bass /= 10;
                    
                    // Spawn ripples on touch/click
                    if (isDown && Math.random() > 0.8) {
                        ripples.push({
                            x: px, y: py, radius: 0, 
                            maxRadius: (bass * 2) + 100, 
                            color: \`hsl(\${bass + 180}, 100%, 60%)\`
                        });
                    }
                    
                    for(let i=ripples.length-1; i>=0; i--) {
                        let r = ripples[i];
                        r.radius += 2 + (bass/50);
                        
                        ctx.beginPath();
                        ctx.arc(r.x, r.y, r.radius, 0, Math.PI*2);
                        ctx.strokeStyle = r.color;
                        ctx.globalAlpha = Math.max(0, 1 - (r.radius / r.maxRadius));
                        ctx.lineWidth = 3 + (bass/50);
                        ctx.stroke();
                        
                        if (r.radius >= r.maxRadius) ripples.splice(i, 1);
                    }
                    ctx.globalAlpha = 1; // Reset
                });
            `,
            2: `
                let swarm = [];
                window.registerVisualizer('plugin-swarm', 'Freq Swarm', (ctx, w, h, freq, time, px, py, isDown) => {
                    ctx.fillStyle = 'rgba(10,10,10,0.3)';
                    ctx.fillRect(0, 0, w, h);
                    
                    if(swarm.length === 0) {
                        for(let i=0; i<150; i++) {
                            swarm.push({
                                x: w/2, y: h/2, 
                                angle: Math.random()*Math.PI*2, 
                                dist: Math.random()*300 + 50, 
                                id: i
                            });
                        }
                    }
                    
                    let vol = freq.reduce((a,b)=>a+b,0) / freq.length;
                    
                    swarm.forEach(p => {
                        let pFreq = freq[p.id % Math.floor(freq.length/2)]; // Use lower half of freq
                        p.angle += 0.01 + (pFreq/8000);
                        
                        // Pull towards touch/mouse if down, else gently orbit center
                        let anchorX = isDown ? px : w/2;
                        let anchorY = isDown ? py : h/2;
                        
                        let targetX = anchorX + Math.cos(p.angle) * (p.dist + (vol*2));
                        let targetY = anchorY + Math.sin(p.angle) * (p.dist + (vol*2));
                        
                        p.x += (targetX - p.x) * 0.1;
                        p.y += (targetY - p.y) * 0.1;
                        
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, (pFreq/40) + 2, 0, Math.PI*2);
                        ctx.fillStyle = \`hsl(\${pFreq + p.dist}, 80%, 60%)\`;
                        ctx.fill();
                    });
                });
            `,
            3: `
                let pathHistory = [];
                window.registerVisualizer('plugin-strings', 'Audio Strings', (ctx, w, h, freq, time, px, py, isDown) => {
                    ctx.fillStyle = 'rgba(10,10,10,0.15)';
                    ctx.fillRect(0, 0, w, h);
                    
                    // Track drawing
                    if (isDown) {
                        pathHistory.push({x: px, y: py});
                        if (pathHistory.length > 80) pathHistory.shift();
                    } else if (pathHistory.length > 0) {
                        pathHistory.shift(); // fade out tail slowly when released
                    }
                    
                    if (pathHistory.length < 2) return;
                    
                    ctx.beginPath();
                    ctx.moveTo(pathHistory[0].x, pathHistory[0].y);
                    
                    for(let i=1; i<pathHistory.length; i++) {
                        // Modulate position by waveform
                        let waveVal = time[i % time.length];
                        let waveOffset = (waveVal - 128) * (isDown ? 0.8 : 0.2);
                        
                        let nx = pathHistory[i].x + waveOffset;
                        let ny = pathHistory[i].y + waveOffset;
                        ctx.lineTo(nx, ny);
                    }
                    
                    let vol = freq[10] || 0;
                    ctx.strokeStyle = \`hsl(\${(Date.now()/15) % 360}, 100%, \${50 + (vol/5)}%)\`;
                    ctx.lineWidth = (vol/20) + 3;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    
                    // Add glow
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = ctx.strokeStyle;
                    
                    ctx.stroke();
                    ctx.shadowBlur = 0; // reset
                });
            `
        };

        window.loadBuiltInScript = function(id) {
            injectScript(PREVIEW_SCRIPTS[id]);
            closeModal();
            // Ensure mic starts if they load an interactive script
            if (!isRecording) toggleMicrophone();
        };

        // --- Event Listeners ---
        micBtn.addEventListener('click', toggleMicrophone);
        
        styleSelect.addEventListener('change', (e) => {
            currentStyle = e.target.value;
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        });

        openScriptsBtn.addEventListener('click', () => {
            scriptsModal.classList.add('active');
        });

        function closeModal() {
            scriptsModal.classList.remove('active');
        }

        closeModalBtn.addEventListener('click', closeModal);
        scriptsModal.addEventListener('click', (e) => {
            if (e.target === scriptsModal) closeModal();
        });

        // Handle Custom JS File Uploads
        scriptUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                injectScript(ev.target.result);
                closeModal();
                // Reset file input so the same file can be uploaded again if edited
                scriptUpload.value = ''; 
            };
            reader.readAsText(file);
        });

        // Start
        window.addEventListener('load', initCanvas);

    </script>
</body>
</html>
